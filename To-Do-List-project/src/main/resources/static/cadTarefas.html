<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>To-Do-List | Cadastro de Tarefas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div>
	<h3>Cadastro de Tarefas</h3>
	<div class="card">
	<div class="col-md-3">
	<form action=""  id="formCadastroTarefas">
		<div class="mb-3">
			<label for="titulo" class="form-label">Titulo da Tarefa</label>
			<input type="text" class="form-control" id="titulo" placeholder="">
			</div>
			<div class="mb-3">
			 <label for="descricao" class="form-label">Descrição da Tarefa</label>
			 <textarea class="form-control" id="descricao" rows="3"></textarea>
		</div>
		<div class="mb-3">
			<label for="concluido" class="form-label">Concluido</label>
			<input type="text" class="form-control" id="concluido" placeholder="">
			</div>
			<div class="mb-3">
			<label for="prioridade" class="form-label">Prioridade</label>
			<input type="text" class="form-control" id="prioridade" placeholder="">
			</div>
			<div class="mb-3">
			<label for="categoria" class="form-label">Categoria</label>
			<input type="text" class="form-control" id="categoria" placeholder="">
			</div>
			<!-- <div class="mb-3">
			<label for="dataHora" class="form-label">Data da Criação</label>
			<input type="date" class="form-control" id="dataHora" name="dataHora" placeholder="">
			</div> -->
		<button type="button" class="btn btn-success" onclick="salvarTarefas()">Salvar</button>
	</form>
	</div>
	</div>
</div>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

<script type="text/javascript">

function salvarTarefas(){
	

	var titulo = $('#titulo').val();
	var descricao = $('#descricao').val();
	/*var concluido = $('#concluido').val();
	var prioridade = $('#prioridade').val();
	var categoria = $('#categoria').val();
	
	var dataCriacao = $(this).serialize();*/
	
	
	
	
	/* Exibindo data no input ao iniciar tarefa
	var d = new Date();
	dataHora = (d.toLocaleString());    
	alert(d.toLocaleString());

	// Mostrando data no campo
	$('#dataHora').val();
	$('#dataHora').val(dataHora);*/
	
		
	$.ajax({
		  method: "POST",
		  url: "/cadastrarTarefas",
		  data:JSON.stringify({titulo : titulo, descricao : descricao}),
		  contentType: "application/json; charset-utf-8",
		  success: function (response){
			  //$("#id").val(response.id);
			  alert("Gravou com sucesso!");
		  }
		}).fail(function(xhr, status, errorThrown){
			alert("Erro ao salvar o tarefa : " + xhr.responseText);
		
		});
	
		
}
	
	
</script>
</body>
</html>
