<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>To-Do-List | Cadastro de Tarefas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div>
	<h3>Cadastro de Tarefas</h3>
	<div class="form-coltrol row col card">
	<form action="" method="GET">
		<div class="mb-3">
			<label for="titulo" class="form-label">Titulo da Tarefa</label>
			<input type="text" class="form-control" id="titulo" placeholder="">
			</div>
			<div class="mb-3">
			 <label for="exampleFormControlTextarea1" class="form-label">Descrição da Tarefa</label>
			 <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
		</div>
		<button type="button" class="btn btn-success">Salvar</button>
	</form>
	</div>
</div>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</body>
</html>
