<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>To-Do-List | Cadastro de Tarefas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    body {
        background-color: #f8f9fa;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .navbar {
        box-shadow: 0 2px 4px rgba(0,0,0,.1);
    }
    
    .main-container {
        padding: 20px;
    }
    
    .form-container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        padding: 0;
        margin-bottom: 20px;
    }
    
    .card-header {
        background: linear-gradient(135deg, #4361ee, #3a0ca3);
        color: white;
        border-radius: 10px 10px 0 0 !important;
    }
    
    .table-container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    
    .table-title {
        background-color: #f8f9fa;
        padding: 15px;
        border-bottom: 1px solid #dee2e6;
        font-weight: 600;
    }
    
    .btn-action {
        padding: 0.25rem 0.5rem;
        font-size: 0.875rem;
    }
    
    .priority-badge {
        padding: 0.25em 0.6em;
        border-radius: 10px;
        font-size: 0.75em;
        font-weight: 600;
    }
    
    .priority-high {
        background-color: #ffebee;
        color: #d32f2f;
    }
    
    .priority-medium {
        background-color: #fff8e1;
        color: #ff8f00;
    }
    
    .priority-low {
        background-color: #e8f5e9;
        color: #388e3c;
    }
    
    .form-label {
        font-weight: 500;
        margin-bottom: 5px;
    }
    
    .form-control, .form-select {
        border-radius: 6px;
        border: 1px solid #ced4da;
        padding: 8px 12px;
    }
    
    .form-control:focus, .form-select:focus {
        border-color: #4361ee;
        box-shadow: 0 0 0 0.2rem rgba(67, 97, 238, 0.25);
    }
    
    .btn-success {
        background-color: #28a745;
        border-color: #28a745;
        border-radius: 6px;
        padding: 8px 20px;
    }
    
    .btn-primary {
        background-color: #4361ee;
        border-color: #4361ee;
        border-radius: 6px;
        padding: 8px 20px;
    }
    
    .btn-warning {
        background-color: #ffc107;
        border-color: #ffc107;
        border-radius: 4px;
    }
    
    .btn-danger {
        background-color: #dc3545;
        border-color: #dc3545;
        border-radius: 4px;
    }
    
    .table th {
        background-color: #f8f9fa;
        border-top: none;
        font-weight: 600;
        padding: 12px 15px;
    }
    
    .table td {
        padding: 12px 15px;
        vertical-align: middle;
    }
    
    .table-hover tbody tr:hover {
        background-color: rgba(67, 97, 238, 0.05);
    }
    
    @media (max-width: 768px) {
        .main-container {
            padding: 10px;
        }
        
        .table-responsive {
            font-size: 0.875rem;
        }
        
        .btn-action {
            font-size: 0.75rem;
            padding: 0.2rem 0.4rem;
        }
    }
</style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-tasks me-2"></i>ToDo List
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">
                            <i class="fas fa-home me-1"></i>Home
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid main-container">
        <div class="row">
            <!-- Form Column -->
            <div class="col-lg-5 col-xl-4">
                <div class="form-container">
                    <div class="card">
                        <div class="card-header text-center">
                            <h4 class="card-title mb-0">
                                <i class="fas fa-plus-circle me-2"></i>Cadastro de Tarefas
                            </h4>
                        </div>
                        <div class="card-body">
                            <form action="" id="formCadastroTarefas">
                                <div class="mb-3">
                                    <label for="id" class="form-label">ID</label>
                                    <input type="text" class="form-control" id="id" readonly="readonly">
                                </div>
                                <div class="mb-3">
                                    <label for="titulo" class="form-label">Título da Tarefa</label>
                                    <input type="text" class="form-control" id="titulo" placeholder="Digite o título da tarefa" required="required">
                                </div>
                                <div class="mb-3">
                                    <label for="descricao" class="form-label">Descrição da Tarefa</label>
                                    <textarea class="form-control" id="descricao" rows="3" placeholder="Descreva a tarefa" required="required"></textarea>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="concluido">
                                        <label class="form-check-label" for="concluido">
                                            Tarefa Concluída
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="prioridade" class="form-label">Prioridade</label>
                                    <select class="form-select" id="prioridade" required="required">
                                        <option value="" selected disabled>Selecione a prioridade</option>
                                        <option value="Alta">Alta</option>
                                        <option value="Media">Média</option>
                                        <option value="Baixa">Baixa</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="dataCriacao" class="form-label">Data Criação</label>
                                    <input type="date" class="form-control" id="dataCriacao" required="required">
                                </div>
                                <div class="mb-3">
                                    <label for="categoria" class="form-label">Categoria</label>
                                    <input type="text" class="form-control" id="categoria" placeholder="Ex: Trabalho, Pessoal, Estudos" required="required">
                                </div>
                                <div class="card-footer bg-transparent border-0 pt-3">
                                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                        <button type="button" class="btn btn-success me-md-2" onclick="salvarTarefas()">
                                            <i class="fas fa-save me-1"></i>Salvar Tarefa
                                        </button>
                                        <button type="button" class="btn btn-primary" onclick="document.getElementById('formCadastroTarefas').reset()">
                                            <i class="fas fa-plus me-1"></i>Novo
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Table Column -->
            <div class="col-lg-7 col-xl-8">
                <div class="table-container">
                    <div class="table-title">
                        <h5 class="mb-0">
                            <i class="fas fa-list me-2"></i>Lista de Tarefas
                        </h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover" id="tabelaResultados">
                            <thead>
                                <tr>
                                    <th scope="col">ID</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Título</th>
                                    <th scope="col">Descrição</th>
                                    <th scope="col">Prioridade</th>
                                    <th scope="col">Categoria</th>
                                    <th scope="col">Data Criação</th>
                                    <th scope="col" class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Os dados serão inseridos aqui via JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
</body>
</html>
