#Spring Boot server configuration

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/to-do-list
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults = false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.data.web.pageable.serialization-mode=via-dto

#SEGURANÇA SIMPLES COM LOGIN NA APLICAÇÃO SPRING BOOT SECURITY JWT
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=USER

# Exemplo usando Mailtrap para desenvolvimento
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=seunome
spring.mail.password=suasenha
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Chave JWT (Mínimo 32 caracteres)
jwt.secret=minha_chave_secreta_e_muito_segura_com_mais_de_32_caracteres_2026_to_do_list
jwt.expiration=86400000

server.address=0.0.0.0
server.port=8080

